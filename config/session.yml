# Session Persistence Configuration

# Redis (Primary storage, TTL=7 days)
redis:
  host: localhost
  port: 6379
  db: 0
  password: ""  # Optional, leave empty if no auth
  prefix: "session:"  # Key prefix for session data
  ttl: 604800  # 7 days in seconds

# PostgreSQL (Backup storage, async batch sync)
postgres:
  # Connection config inherited from main DATABASE_URL or separate config
  # See .env.example for POSTGRES_* settings
  pass

# Sync settings
sync:
  batch_interval: 60    # Seconds between PostgreSQL sync (default 60)
  batch_size: 100        # Sessions to accumulate before triggering immediate sync

# LangGraph checkpoint compatibility
checkpointer:
  # session_id format: "{project_id}_{timestamp}" or custom
  # The SessionManager.get/put methods provide LangGraph checkpointer interface
  pass
