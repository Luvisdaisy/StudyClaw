[project]
name = "studyclaw"
version = "0.1.0"
description = "AI-powered customer service chatbot for floor cleaning robots"
requires-python = ">=3.10"
dependencies = [
    "streamlit>=1.28.0",
    "langchain>=0.1.0",
    "langgraph>=0.0.20",
    "langchain-community>=0.0.10",
    "dashscope>=1.14.0",
    "chromadb>=0.4.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "pytest>=7.0.0",
]

[tool.uv]
dev-dependencies = []
