# StudyClaw Configuration

# Model settings
chat_model_name: qwen3-max
embedding_model_name: text-embedding-v4

# Chroma/RAG settings
collection_name: agent
persist_directory: chroma_db
k: 3

# Document processing settings
data_path: data
allow_knowledge_file_type: ["txt", "pdf", "md"]

# Chunking settings
chunk_size: 500
chunk_overlap: 20
separators: ["\n\n", "\n", ".", "!", "?", "。", "！", "？", " ", ""]

# Prompt paths
main_prompt_path: prompts/main_prompts.txt
rag_prompt_path: prompts/rag_prompts.txt
